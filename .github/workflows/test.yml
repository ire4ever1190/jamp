name: Tests

on:
  push:
    branches:
      - "master"
  pull_request:


jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim:
          # - '1.6.0'
          # - 'stable'
          - 'devel'
      fail-fast: false
      max-parallel: 3

    name: Nim ${{ matrix.nim }}
    steps:
    - name: Setup Nim Enviroment
      uses: actions/checkout@master

    - name: Cache choosenim
      id: cache-choosenim
      uses: actions/cache@v1
      with:
        path: ~/.nimble
        key: ${{ runner.os }}-nimble-${{ matrix.nim }}-${{ hashFiles('jamp.nimble') }}

    - uses: jiro4989/setup-nim-action@v1
      with:
          nim-version: ${{ matrix.nim }}

    - name: Update nimble
      run: nimble update

    - uses: docker-practice/actions-setup-docker@master

    - name: Install Stalwart CLI
      run: |
        curl \
          https://github.com/stalwartlabs/mail-server/releases/download/v0.10.5/stalwart-cli-x86_64-unknown-linux-gnu.tar.gz \
          -Lo cli.tar.gz
        tar -xf cli.tar.gz
        sudo cp stalwart-cli /usr/local/bin/

    - name: Start test mail server
      run: nimble startContainer

    - name: Run tests
      run: nimble test

    - name: Test doc examples
      run: nimble doc --project src/jamp.nim
